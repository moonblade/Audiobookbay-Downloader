<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search</title>
    <link rel="icon" href="/static/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js loaded after app() definition below -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        .progress-bar {
            height: 1rem;
            background-color: #e2e8f0;
            border-radius: 0.5rem;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background-color: #4ade80;
            border-radius: 0.5rem;
            width: 0%;
            transition: width 0.5s ease-in-out;
        }
    </style>
    <script>
    function app() {
  return {
    query: '',
    results: [],
    loadingSearch: false,
    searchComplete: false,
    searchError: '',
    funnyMessages: [
        'Searching... This better be worth it!',
        'Hold on, this takes a while...',
        'Still searching... Maybe grab a snack?',
        'Patience, young grasshopper...',
        'Wow, this is taking a minute!',
        'Don\'t worry, I got this!',
        'Maybe go for a walk?',
        'Still thinking... Almost there!',
        'Finding the best results for you!',
        'Hang tight! Searching magic happening!',
        'One moment... while I consult the ancients.',
        'Beep boop... processing... please wait...',
        'My hamsters are running on a wheel, almost there!',
        'Just gathering some pixie dust, be right back!',
        'Is it lunchtime yet? Oh, searching... right.',
        'Please remain calm, the search is in progress.',
        'Warning: Search may cause extreme awesomeness.',
        'Calculating the optimal route to your results...',
        'Almost there... just defragmenting my brain.',
        'Searching... because the internet is a big place!',
        'Polishing the search results for your viewing pleasure.',
        'The search is strong with this one.',
        'Please wait while I summon the search demons.',
        'Searching in hyperspace... almost there!',
        'My coffee is kicking in... search commencing!',
        'Just a few more gigabytes to process...',
        'Rome wasn\'t built in a day.',
        'Don\'t blame me, the internet is slow today.',
        'Almost there... just need to find the right key...',
    ],
    currentFunnyMessage: '',
    messageInterval: null,
    username: null,
    role: null,
    id: null,
    torrentClientType: null,


    goodreadsEnabled: false,
    goodreadsConfig: { user_id: '', shelf: 'to-read', poll_interval: 60, enabled: false, last_poll: null, last_poll_status: null, last_poll_message: null },
    processedBooks: [],
    loadingGoodreads: false,
    goodreadsError: '',
    goodreadsSuccess: '',
    validationResult: null,
    pollingNow: false,

    async search() {
        if (!this.query) return;
        this.loadingSearch = true;
        this.searchComplete = false;
        this.searchError = '';
        this.results = [];
        const shuffledMessages = [...this.funnyMessages].sort(() => Math.random() - 0.5);

        let index = 0;
        this.messageInterval = setInterval(() => {
            this.currentFunnyMessage = shuffledMessages[index % shuffledMessages.length];
            index++;
        }, 5000);

        try {
            let response = await fetch(`/search?query=${encodeURIComponent(this.query)}`);
            if (!response.ok) throw new Error('Failed to fetch results');
            let data = await response.json();
            this.results = data.results || [];
        } catch (error) {
            this.searchError = error.message;
        } finally {
            this.searchComplete = true;
            this.loadingSearch = false;
            clearInterval(this.messageInterval);
            this.currentFunnyMessage = '';
        }
    },

    loadingAdd: {},
    addError: {},
    
    async add(url) {
        this.loadingAdd[url] = true;
        this.addError[url] = '';
        this.searchError = '';

        
        try {
            let requestBody = { url };

            let response = await fetch('/add', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(requestBody)
            });
            let data = await response.json();
            if (data.status !== 'ok') throw new Error(data.message || 'Error adding torrent');
            this.searchComplete = false;
            this.searchError = 'Successfully added torrent!';
        } catch (error) {
            this.addError[url] = error.message;
        } finally {
            this.loadingAdd[url] = false;
        }
    },

    async keydown(event) {
      this.searchComplete = false;
    },

    torrentStatus: [],
    loadingTorrentStatus: false,

    refreshInterval: 4000,

    getTorrentStatus: function() {
        this.loadingTorrentStatus = true;
        fetch('/list')
            .then(response => {
                if (!response.ok) {
                    throw new Error('Failed to fetch torrent status');
                }
                return response.json();
            })
            .then(data => {
                this.torrentStatus = data;
            })
            .catch(error => {
                console.error(error);
            })
            .finally(() => {
                this.loadingTorrentStatus = false;
                if (this.activeTab === 'status') {
                    setTimeout(() => this.getTorrentStatus(), this.refreshInterval);
                }
            });
    },
    activeTab: 'search',
    query: '',
    results: [],
    loadingSearch: false,
    searchComplete: false,
    searchError: '',
    title: 'Search',

    getUsers() {
        this.loadingUsers = true;
        fetch('/users')
        .then(response => {
            if (!response.ok) {
                throw new Error('Failed to fetch users');
            }
            return response.json();
        })
        .then(data => {
            this.users = data;
        })
        .catch(error => {
            console.error(error);
        })
        .finally(() => {
            this.loadingUsers = false;
        });
    },

    formatEta(seconds) {
        if (!seconds || seconds < 0) return 'Unknown';
        if (seconds < 60) return seconds + ' sec';
        if (seconds < 3600) return Math.floor(seconds / 60) + ' min';
        return Math.floor(seconds / 3600) + ' hr ' + Math.floor((seconds % 3600) / 60) + ' min';
    },

    createUser() {
        this.newUserError = '';
        if (!this.newUser.username || !this.newUser.password) {
            this.newUserError = 'Username and password are required.';
            return;
        }

        fetch('/users', {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(this.newUser)
        })
        .then(response => {
            if (!response.ok) {
                return response.json().then(err => {throw new Error(err.detail || 'Failed to create user')});
            }
            this.newUser = { username: '', password: '' };
            this.getUsers();
        })
        .catch(error => {
            console.error(error);
            this.newUserError = error.message;
        });
    },

    startEdit(user) {
        this.editingUser = { ...user };
        this.editPassword = '';
        this.editError = '';
    },

    cancelEdit() {
        this.editingUser = null;
        this.editPassword = '';
        this.editError = '';
    },

    updateUserPassword() {
        this.editError = '';
        if (!this.editPassword) {
            this.editError = 'Password is required for change.';
            return;
        }

        fetch('/change_password', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ id: this.editingUser.id, password: this.editPassword })
        })
        .then(response => {
            if (!response.ok) {
                return response.json().then(err => {throw new Error(err.detail || 'Failed to change password')});
            }
            this.cancelEdit();
            this.getUsers();
        })
        .catch(error => {
            console.error(error);
            this.editError = error.message;
        });
    },

    deleteUser(id) {
        this.deleteError = '';
        if (confirm('Are you sure you want to delete this user?')) {
            fetch(`/users/${id}`, {
                method: 'DELETE'
            })
            .then(response => {
                if (!response.ok) {
                  return response.json().then(err => {throw new Error(err.detail || 'Failed to delete user')});
                }
                this.getUsers();
            })
            .catch(error => {
                console.error(error);
                this.deleteError = error.message;
            });
        }
    },

    async setTitle() {
        try {
            const response = await fetch('/title');
            if (!response.ok) {
                throw new Error('Failed to fetch title');
            }
            const data = await response.json();
            document.title = data.title;
            this.title = data.title;
        } catch (error) {
            console.error('Error fetching title:', error);
        }
    },

    init() {
        this.fetchRole();
        this.setTitle();
        this.fetchTorrentClientType();
        this.fetchGoodreadsEnabled();
    },

    async fetchRole() {
        try {
            const response = await fetch('/role');
            if (!response.ok) {
                throw new Error('Failed to fetch role');
            }
            const data = await response.json();
            this.role = data.role;
            if (this.role === null) {
                window.location.href = '/login';
            }
        } catch (error) {
            console.error('Error fetching role:', error);
            window.location.href = '/login';
        }
    },

    async fetchTorrentClientType() {
        try {
            const response = await fetch('/torrent-client-type');
            if (!response.ok) {
                throw new Error('Failed to fetch torrent client type');
            }
            const data = await response.json();
            this.torrentClientType = data.torrent_client_type;
        } catch (error) {
            console.error('Error fetching torrent client type:', error);
            this.torrentClientType = 'transmission';
        }
    },

    async fetchGoodreadsEnabled() {
        try {
            const response = await fetch('/goodreads-enabled');
            if (response.ok) {
                const data = await response.json();
                this.goodreadsEnabled = data.enabled;
            }
        } catch (error) {
            console.error('Error fetching goodreads enabled:', error);
        }
    },

    async fetchGoodreadsConfig() {
        this.loadingGoodreads = true;
        this.goodreadsError = '';
        try {
            const response = await fetch('/goodreads/config');
            if (!response.ok) throw new Error('Failed to fetch config');
            const data = await response.json();
            this.goodreadsConfig = data;
        } catch (error) {
            this.goodreadsError = error.message;
        } finally {
            this.loadingGoodreads = false;
        }
    },

    async saveGoodreadsConfig() {
        this.loadingGoodreads = true;
        this.goodreadsError = '';
        this.goodreadsSuccess = '';
        try {
            const response = await fetch('/goodreads/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    user_id: this.goodreadsConfig.user_id,
                    shelf: this.goodreadsConfig.shelf,
                    poll_interval: this.goodreadsConfig.poll_interval,
                    enabled: this.goodreadsConfig.enabled
                })
            });
            if (!response.ok) throw new Error('Failed to save config');
            const data = await response.json();
            this.goodreadsConfig = data;
            this.goodreadsSuccess = 'Configuration saved successfully!';
        } catch (error) {
            this.goodreadsError = error.message;
        } finally {
            this.loadingGoodreads = false;
        }
    },

    async validateGoodreadsConfig() {
        this.loadingGoodreads = true;
        this.validationResult = null;
        this.goodreadsError = '';
        try {
            const response = await fetch('/goodreads/validate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    user_id: this.goodreadsConfig.user_id,
                    shelf: this.goodreadsConfig.shelf
                })
            });
            if (!response.ok) throw new Error('Validation request failed');
            this.validationResult = await response.json();
        } catch (error) {
            this.goodreadsError = error.message;
        } finally {
            this.loadingGoodreads = false;
        }
    },

    async triggerPoll() {
        this.pollingNow = true;
        this.goodreadsError = '';
        this.goodreadsSuccess = '';
        try {
            const response = await fetch('/goodreads/poll', { method: 'POST' });
            if (!response.ok) throw new Error('Poll failed');
            const result = await response.json();
            this.goodreadsSuccess = result.message || 'Poll completed';
            this.fetchGoodreadsConfig();
            this.fetchProcessedBooks();
        } catch (error) {
            this.goodreadsError = error.message;
        } finally {
            this.pollingNow = false;
        }
    },

    async fetchProcessedBooks() {
        try {
            const response = await fetch('/goodreads/books');
            if (!response.ok) throw new Error('Failed to fetch books');
            this.processedBooks = await response.json();
        } catch (error) {
            console.error('Error fetching processed books:', error);
        }
    },

    async deleteProcessedBook(bookId) {
        try {
            const response = await fetch(`/goodreads/books/${bookId}`, { method: 'DELETE' });
            if (!response.ok) throw new Error('Failed to delete book');
            this.fetchProcessedBooks();
        } catch (error) {
            this.goodreadsError = error.message;
        }
    },

    async clearAllBooks() {
        if (!confirm('Are you sure you want to clear all processed books? This will allow re-downloading.')) return;
        try {
            const response = await fetch('/goodreads/books', { method: 'DELETE' });
            if (!response.ok) throw new Error('Failed to clear books');
            this.fetchProcessedBooks();
            this.goodreadsSuccess = 'All processed books cleared';
        } catch (error) {
            this.goodreadsError = error.message;
        }
    },

    deletingTorrent: null,
    deleteTorrentError: null,
    confirmDelete: false,
    torrentToDelete: null,

    async deleteTorrent(torrentId) {
        this.torrentToDelete = torrentId;
        this.confirmDelete = true;
    },

    async confirmDeleteTorrent() {
        if (!this.torrentToDelete) return;
        this.deletingTorrent = this.torrentToDelete;
        this.deleteTorrentError = null;

        try {
            const response = await fetch(`/torrent/${this.torrentToDelete}?delete_data=true`, {
                method: 'DELETE'
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.detail || 'Failed to delete torrent');
            }

            this.getTorrentStatus();
            this.confirmDelete = false;
            this.torrentToDelete = null;
            this.deletingTorrent = null;
        } catch (error) {
            console.error('Error deleting torrent:', error);
            this.deleteTorrentError = error.message;
        } finally {
            this.deletingTorrent = null;
        }
    },

    cancelDeleteTorrent() {
        this.confirmDelete = false;
        this.torrentToDelete = null;
        this.deleteTorrentError = null;
    },

    async toggleTorrent(torrentId, status) {
        try {
            const action = status === 'Stopped' ? 'play' : 'pause';
            const response = await fetch(`/torrent/${torrentId}/${action}`, {
                method: 'POST'
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.detail || `Failed to ${action} torrent`);
            }

            this.getTorrentStatus();
        } catch (error) {
            console.error(`Error toggling torrent:`, error);
        }
    },

    showCategoryModal: false,
    categoryTorrentId: null,
    newCategory: '',
    settingCategory: false,
    categoryError: '',

    openCategoryModal(torrentId) {
        this.categoryTorrentId = torrentId;
        this.newCategory = '';
        this.categoryError = '';
        this.showCategoryModal = true;
    },

    closeCategoryModal() {
        this.showCategoryModal = false;
        this.categoryTorrentId = null;
        this.newCategory = '';
        this.categoryError = '';
    },

    async setCategory() {
        if (!this.newCategory.trim()) {
            this.categoryError = 'Category name is required';
            return;
        }
        this.settingCategory = true;
        this.categoryError = '';
        try {
            const response = await fetch(`/torrent/${this.categoryTorrentId}/category`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ category: this.newCategory.trim() })
            });
            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.detail || 'Failed to set category');
            }
            this.closeCategoryModal();
            this.getTorrentStatus();
        } catch (error) {
            console.error('Error setting category:', error);
            this.categoryError = error.message;
        } finally {
            this.settingCategory = false;
        }
    },


    showCandidateDialog: false,
    selectedCandidate: null,
    selectedTorrent: null,
    showCandidates(torrent) {
        this.selectedCandidate = null;
        this.candidates = torrent.candidates;
        if (!this.candidates || this.candidates.length === 0) {
          this.candidates = [{
            "match": 0,
            "artist": "",
            "album": "Use as is",
            "cover": "",
            "id": "asis",
            "length": "",
          }];
        }
        this.selectedTorrent = torrent;
        this.showCandidateDialog = true;
    },
    async autoimport() {
        fetch('/autoimport', {
            method: 'POST'
        })
        .then(response => {
            if (!response.ok) {
                return response.json().then(err => {throw new Error(err.detail || 'Failed to autoimport')});
            }
            this.getTorrentStatus();
        })
        .catch(error => {
            console.error(error);
        });
    },
    async selectCandidate(candidate) {
        try {
            const response = await fetch(`/selectCandidate/${this.selectedTorrent.hash_string}/${candidate.id}`, {
                method: 'POST'
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.detail || 'Failed to select candidate');
            } else {
                this.autoimport();
            }
        } catch (error) {
            console.error('Error selecting candidate:', error);
        } finally {
            this.showCandidateDialog = false;
        }
    }
  }
}
    </script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</head>

<body class="bg-gray-800 text-white p-6" x-data="app()" x-init="init">

    <div class="max-w-3xl mx-auto mb-6 flex justify-center">
        <button @click="activeTab = 'search'" :class="{'bg-gray-700 text-white px-4 py-2': activeTab === 'search', 'text-gray-400 px-4 py-2 hover:bg-gray-700 hover:text-white': activeTab !== 'search'}" class="rounded-l">Search</button>
        <button @click="activeTab = 'status'; getTorrentStatus();" :class="{'bg-gray-700 text-white px-4 py-2': activeTab === 'status', 'text-gray-400 px-4 py-2 hover:bg-gray-700 hover:text-white': activeTab !== 'status'}">Status</button>
        <button x-show="goodreadsEnabled" @click="activeTab = 'goodreads'; fetchGoodreadsConfig(); fetchProcessedBooks();" :class="{'bg-gray-700 text-white px-4 py-2': activeTab === 'goodreads', 'text-gray-400 px-4 py-2 hover:bg-gray-700 hover:text-white': activeTab !== 'goodreads'}" class="rounded-r">Goodreads</button>
    </div>

    <div x-show="activeTab === 'search'" class="max-w-3xl mx-auto mt-6">
        <h2 class="text-2xl font-bold mb-4" x-text="title"></h2>
        <div class="flex gap-2">
            <input type="text" x-model="query" @input="keydown" autocomplete="off" @keydown.enter="search" class="border p-2 flex-grow rounded bg-gray-600 text-white" placeholder="Search...">
            <button @click="search" :disabled="loadingSearch" class="bg-blue-600 text-white px-4 py-2 rounded flex items-center gap-2 disabled:opacity-50">
                <span x-show="loadingSearch" class="animate-spin border-2 border-white border-t-transparent rounded-full w-4 h-4"></span>
                Search
            </button>
        </div>
        <p x-show="searchError" class="text-red-500 mt-2" x-text="searchError"></p>
        <p x-show="loadingSearch" class="text-gray-400 mt-2 italic" x-text="currentFunnyMessage"></p>

        <div class="max-w-3xl mx-auto mt-6" x-show="results.length">
            <template x-for="result in results" :key="result.Guid">
                <div class="bg-gray-700 p-4 rounded shadow mb-2 flex items-center gap-4">
                    <img :src="result.Poster" x-show="result.Poster" class="w-16 h-16 object-cover rounded">
                    <div class="flex-grow w-3/4">
                        <h2 class="font-bold break-words" x-text="result.Title"></h2>
                        <p class="text-sm text-gray-400">Size: <span x-text="(result.Size / 1024 / 1024 / 1024).toFixed(2) + ' GB'"></span></p>
                    </div>
                    <button @click="add(result.MagnetUri || result.Link)" :disabled="loadingAdd[result.MagnetUri || result.Link]==true" class="bg-green-600 text-white px-3 py-1 rounded flex items-center gap-2 disabled:opacity-50">
                        <span x-show="loadingAdd[result.MagnetUri || result.Link]" class="animate-spin border-2 border-white border-t-transparent rounded-full w-4 h-4"></span>
                        Add
                    </button>
                </div>
                <p x-show="addError[result.MagnetUri || result.Link]" class="text-red-500 text-sm mt-1" x-text="addError[result.MagnetUri || result.Link]"></p>
            </template>
        </div>

        <p class="max-w-xl mx-auto mt-6 text-center text-gray-400" x-show="searchComplete && results.length === 0 && query">No results found. Try a different search term!</p>
    </div>

    <div x-show="activeTab === 'status'" class="max-w-3xl mx-auto mt-6 px-2">
      <h2 class="text-2xl font-bold mb-4">Torrent Status</h2>
      
      <template x-for="torrent in torrentStatus" :key="torrent.id">
        <div class="bg-gray-700 p-4 rounded-lg shadow-md mb-3">
          <div class="flex justify-between items-start mb-2">
            <div class="flex items-center gap-2 flex-1">
              <div class="flex-shrink-0">
                <i x-show="torrent.status === 'Seeding'" class="fas fa-arrow-up text-green-500"></i>
                <i x-show="torrent.status === 'Downloading'" class="fas fa-arrow-down text-blue-500"></i>
                <i x-show="torrent.status === 'Stopped'" class="fas fa-pause text-gray-500"></i>
              </div>
              <h3 class="font-bold text-sm sm:text-base break-words pr-2" x-text="torrent.name"></h3>
            </div>
            <div class="flex items-center gap-2" x-show="torrent.use_beets_import">
              <i x-show="torrent.status === 'Seeding' && torrent.importError" class="fas fa-exclamation-circle text-red-500 cursor-pointer" title="Import Error" @click="showCandidates(torrent)"></i>
              <i x-show="torrent.status === 'Seeding' && !torrent.imported && !torrent.importError" class="fas fa-question-circle text-yellow-500" title="Not Imported"></i>
              <i x-show="torrent.status === 'Seeding' && torrent.imported && !torrent.importError" class="fas fa-check-circle text-green-500" title="Imported"></i>
            </div>
          </div>
          
          <div class="h-4 w-full bg-gray-600 rounded-full overflow-hidden mb-3" :style="{backgroundColor: torrent.status === 'Seeding' ? '#4ade80' : '#e2e8f0'}">
            <div class="h-full rounded-full" 
                 :style="{
                   width: torrent.status === 'Stopped' ? torrent.percent_done + '%' : (torrent.upload_ratio > 0 ? torrent.upload_ratio * 100 + '%' : torrent.percent_done + '%'),
                   backgroundColor: torrent.status === 'Stopped' ? '#a0aec0' : (torrent.upload_ratio > 0 ? '#065f46' : '#4ade80')
                 }"></div>
          </div>
          
          <div class="flex items-center justify-between">
            <div class="grid grid-cols-2 gap-x-4 gap-y-1 text-xs text-gray-400 flex-1 mr-2">
              <div>Size: <span x-text="(torrent.total_size / 1024 / 1024).toFixed(2) + ' MB'"></span></div>
              <div x-show="torrent.added_by != ''">Added: <span x-text="torrent.added_by.charAt(0).toUpperCase() + torrent.added_by.slice(1)"></span></div>
              <div x-show="torrent.upload_ratio > 0">Ratio: <span x-text="torrent.upload_ratio.toFixed(2)"></span></div>
              <div x-show="torrent.percent_done > 0  && torrent.percent_done < 100">Progress: <span x-text="(torrent.percent_done).toFixed(1) + '%'"></span></div>
              <div x-show="torrent.status === 'Downloading' && torrent.eta">ETA: <span x-text="formatEta(torrent.eta)"></span></div>
            </div>
            
            <div class="flex items-center gap-2 flex-shrink-0">
              <button x-show="torrentClientType !== 'decypharr'" 
                      @click="toggleTorrent(torrent.id, torrent.status)" 
                      :disabled="deletingTorrent === torrent.id"
                      class="bg-gray-600 hover:bg-gray-500 text-gray-300 rounded flex items-center justify-center disabled:opacity-50 h-8 w-8"
                      title="Pause/Resume">
                <i :class="torrent.status === 'Stopped' ? 'fas fa-play' : 'fas fa-pause'"></i>
              </button>
              
              <button x-show="torrentClientType === 'qbittorrent'" 
                      @click="openCategoryModal(torrent.id)" 
                      :disabled="deletingTorrent === torrent.id"
                      class="bg-gray-600 hover:bg-gray-500 text-gray-300 rounded flex items-center justify-center disabled:opacity-50 h-8 w-8"
                      title="Set Category">
                <i class="fas fa-folder"></i>
              </button>
              
              <button @click="deleteTorrent(torrent.id)" 
                      :disabled="deletingTorrent === torrent.id"
                      class="bg-gray-600 hover:bg-gray-500 text-gray-300 rounded flex items-center justify-center disabled:opacity-50 h-8 w-8">
                <span x-show="deletingTorrent === torrent.id" class="animate-spin border-2 border-white border-t-transparent rounded-full w-4 h-4"></span>
                <i x-show="deletingTorrent !== torrent.id" class="fas fa-trash-alt"></i>
              </button>
            </div>
          </div>
        </div>
      </template>
      
      <p x-show="loadingTorrentStatus" class="text-center text-gray-400">Loading torrent status...</p>
      <p x-show="deleteTorrentError" class="text-red-500 mt-2" x-text="deleteTorrentError"></p>
      
      <template x-if="confirmDelete">
    <div class="fixed inset-0 bg-gray-800 bg-opacity-75 flex justify-center items-center z-50 p-4" @click.self="showCandidateDialog = false">
          <div class="bg-gray-700 p-6 rounded-lg w-full max-w-sm">
            <h3 class="text-xl font-bold mb-4">Confirm Delete</h3>
            <p>Are you sure you want to delete this torrent and its data?</p>
            <div class="mt-4 flex justify-end gap-2">
              <button @click="confirmDeleteTorrent" :disabled="deletingTorrent" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded">
                <span x-show="deletingTorrent" class="animate-spin border-2 border-white border-t-transparent rounded-full w-4 h-4 mr-1"></span>
                Delete
              </button>
              <button @click="cancelDeleteTorrent" class="bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded">Cancel</button>
            </div>
          </div>
        </div>
      </template>

      <template x-if="showCategoryModal">
        <div class="fixed inset-0 bg-gray-800 bg-opacity-75 flex justify-center items-center z-50 p-4" @click.self="closeCategoryModal()">
          <div class="bg-gray-700 p-6 rounded-lg w-full max-w-sm">
            <h3 class="text-xl font-bold mb-4">Set Category</h3>
            <div class="mb-4">
              <label class="block text-sm text-gray-400 mb-1">Category Name</label>
              <input type="text" 
                     x-model="newCategory" 
                     @keyup.enter="setCategory()"
                     class="w-full p-2 rounded bg-gray-600 text-white" 
                     placeholder="e.g., audiobooks">
            </div>
            <p x-show="categoryError" class="text-red-500 text-sm mb-3" x-text="categoryError"></p>
            <div class="flex justify-end gap-2">
              <button @click="setCategory()" 
                      :disabled="settingCategory" 
                      class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded flex items-center gap-2 disabled:opacity-50">
                <span x-show="settingCategory" class="animate-spin border-2 border-white border-t-transparent rounded-full w-4 h-4"></span>
                Set Category
              </button>
              <button @click="closeCategoryModal()" class="bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded">Cancel</button>
            </div>
          </div>
        </div>
      </template>
    </div> 

    <div x-show="activeTab === 'goodreads'" class="max-w-3xl mx-auto mt-6 px-2">
        <h2 class="text-2xl font-bold mb-4">Goodreads Integration</h2>
        
        <p x-show="goodreadsError" class="text-red-500 mb-4" x-text="goodreadsError"></p>
        <p x-show="goodreadsSuccess" class="text-green-500 mb-4" x-text="goodreadsSuccess"></p>

        <div class="bg-gray-700 p-4 rounded-lg mb-4">
            <h3 class="text-lg font-semibold mb-3">Configuration</h3>
            
            <div class="space-y-3">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Goodreads User ID</label>
                    <input type="text" x-model="goodreadsConfig.user_id" class="w-full p-2 rounded bg-gray-600 text-white" placeholder="e.g., 54722780">
                </div>
                
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Shelf Name</label>
                    <input type="text" x-model="goodreadsConfig.shelf" class="w-full p-2 rounded bg-gray-600 text-white" placeholder="to-read">
                </div>
                
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Poll Interval (minutes)</label>
                    <input type="number" x-model.number="goodreadsConfig.poll_interval" min="1" class="w-full p-2 rounded bg-gray-600 text-white" placeholder="60">
                </div>
                
                <div class="flex items-center gap-2">
                    <input type="checkbox" x-model="goodreadsConfig.enabled" id="goodreads-enabled" class="w-4 h-4">
                    <label for="goodreads-enabled" class="text-sm">Enable automatic polling</label>
                </div>
            </div>
            
            <div class="flex gap-2 mt-4">
                <button @click="validateGoodreadsConfig()" :disabled="loadingGoodreads" class="bg-yellow-600 hover:bg-yellow-700 text-white px-4 py-2 rounded flex items-center gap-2 disabled:opacity-50">
                    <span x-show="loadingGoodreads && !pollingNow" class="animate-spin border-2 border-white border-t-transparent rounded-full w-4 h-4"></span>
                    Validate
                </button>
                <button @click="saveGoodreadsConfig()" :disabled="loadingGoodreads" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded flex items-center gap-2 disabled:opacity-50">
                    <span x-show="loadingGoodreads && !pollingNow" class="animate-spin border-2 border-white border-t-transparent rounded-full w-4 h-4"></span>
                    Save
                </button>
                <button @click="triggerPoll()" :disabled="pollingNow || !goodreadsConfig.user_id" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded flex items-center gap-2 disabled:opacity-50">
                    <span x-show="pollingNow" class="animate-spin border-2 border-white border-t-transparent rounded-full w-4 h-4"></span>
                    Poll Now
                </button>
            </div>
            
            <div x-show="validationResult" class="mt-3 p-3 rounded" :class="validationResult?.valid ? 'bg-green-900' : 'bg-red-900'">
                <p x-text="validationResult?.message"></p>
                <p x-show="validationResult?.book_count" class="text-sm text-gray-300">Books found: <span x-text="validationResult?.book_count"></span></p>
            </div>
        </div>

        <div class="bg-gray-700 p-4 rounded-lg mb-4" x-show="goodreadsConfig.last_poll">
            <h3 class="text-lg font-semibold mb-2">Last Poll Status</h3>
            <div class="text-sm text-gray-400 space-y-1">
                <p>Time: <span class="text-white" x-text="new Date(goodreadsConfig.last_poll).toLocaleString()"></span></p>
                <p>Status: <span class="text-white" :class="goodreadsConfig.last_poll_status === 'success' ? 'text-green-400' : 'text-red-400'" x-text="goodreadsConfig.last_poll_status"></span></p>
                <p x-show="goodreadsConfig.last_poll_message">Message: <span class="text-white" x-text="goodreadsConfig.last_poll_message"></span></p>
            </div>
        </div>

        <div class="bg-gray-700 p-4 rounded-lg">
            <div class="flex justify-between items-center mb-3">
                <h3 class="text-lg font-semibold">Processed Books (<span x-text="processedBooks.length"></span>)</h3>
                <button x-show="processedBooks.length > 0" @click="clearAllBooks()" class="bg-red-600 hover:bg-red-700 text-white px-3 py-1 rounded text-sm">Clear All</button>
            </div>
            
            <p x-show="processedBooks.length === 0" class="text-gray-400 text-sm">No books processed yet.</p>
            
            <div class="space-y-2 max-h-96 overflow-y-auto">
                <template x-for="book in processedBooks" :key="book.book_id">
                    <div class="flex items-center justify-between bg-gray-600 p-3 rounded">
                        <div class="flex-1">
                            <p class="font-semibold" x-text="book.title"></p>
                            <p class="text-sm text-gray-400" x-text="book.author"></p>
                            <p class="text-xs" :class="book.status === 'downloaded' ? 'text-green-400' : 'text-yellow-400'">
                                <span x-text="book.status === 'downloaded' ? '✓ Downloaded' : '⚠ No results'"></span>
                                <span x-show="book.torrent_name" class="text-gray-500"> - <span x-text="book.torrent_name"></span></span>
                            </p>
                        </div>
                        <button @click="deleteProcessedBook(book.book_id)" class="bg-gray-500 hover:bg-gray-400 text-white px-2 py-1 rounded text-sm ml-2" title="Remove (allows re-download)">
                            <i class="fas fa-redo"></i>
                        </button>
                    </div>
                </template>
            </div>
        </div>
    </div>

<template x-if="showCandidateDialog">
    <div class="fixed inset-0 bg-gray-800 bg-opacity-75 flex justify-center items-center z-50 p-4">
        <div class="bg-gray-700 p-6 rounded-lg w-full max-w-md max-h-[80vh] overflow-y-auto">
            <h3 class="text-xl font-bold mb-4">Select a Candidate</h3>
            <div class="space-y-4">
                <template x-for="candidate in candidates" :key="candidate.id">
                    <div class="flex items-center gap-4 p-4 bg-gray-600 rounded cursor-pointer hover:bg-gray-500" @click="selectCandidate(candidate)">
                        <img :src="candidate.cover" alt="Cover" class="w-16 h-16 object-cover rounded" x-show="candidate.cover">
                        <div>
                            <p class="font-bold" x-text="candidate.album"></p>
                            <p class="text-sm text-gray-400" x-text="candidate.match"></p>
                            <p class="text-sm text-gray-400" x-text="candidate.artist"></p>
                            <p class="text-sm text-gray-400" x-text="candidate.length"></p>
                        </div>
                    </div>
                </template>
            </div>
            <button @click="showCandidateDialog = false" class="mt-4 bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded">Close</button>
        </div>
    </div>
</template>
</body>
</html>
